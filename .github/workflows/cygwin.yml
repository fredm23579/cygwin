name: cygwin

on:
  push:
    # master is a symbolic reference to main — skip it to avoid duplicate runs
    branches-ignore:
      - 'master'
    tags:
      - '*'
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same branch/PR when a new push arrives,
# keeping queues short and saving CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fedora-build:
    runs-on: ubuntu-latest
    container: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: x86_64-pc-cygwin
          pkgarch: 64
    name: Fedora cross ${{ matrix.target }}

    env:
      # Gated deploy: only when the SSH key secret is present
      HAS_SSH_KEY: ${{ secrets.SSH_KEY != '' }}

    steps:
    - uses: actions/checkout@v4

    # --- Toolchain installation (split into logical groups for clearer logs) ---

    - name: Install base build tools
      run: |
        dnf install -y \
          autoconf automake make patch perl \
          mingw${{ matrix.pkgarch }}-gcc-c++ \
          mingw${{ matrix.pkgarch }}-winpthreads-static \
          mingw${{ matrix.pkgarch }}-zlib-static

    - name: Enable dnf COPR plugin
      run: dnf install -y dnf-plugins-core

    - name: Install cross-Cygwin toolchain from COPR (yselkowitz/cygwin)
      run: |
        dnf copr enable -y yselkowitz/cygwin
        dnf install -y \
          cygwin${{ matrix.pkgarch }}-gcc-c++ \
          cygwin${{ matrix.pkgarch }}-gettext \
          cygwin${{ matrix.pkgarch }}-libbfd \
          cygwin${{ matrix.pkgarch }}-libiconv \
          cygwin${{ matrix.pkgarch }}-zlib \
          cocom

    - name: Install documentation build tools
      run: |
        dnf install -y \
          dblatex docbook2X docbook-xsl xmlto \
          python3 python3-lxml python3-ply \
          openssh-clients
        # Regenerate LaTeX font map so dblatex/pdflatex can build PDFs
        fmtutil-sys --byfmt pdflatex && texhash

    # --- Build ---

    - name: Configure, build, and install
      run: |
        mkdir build install
        (cd winsup && ./autogen.sh)
        (cd build && ../configure \
          --target=${{ matrix.target }} \
          --prefix=$(realpath $(pwd)/../install))
        make -j$(nproc) -C build
        make -C build/*/newlib info man
        make -C build install
        make -C build/*/newlib install-info install-man

    # --- Documentation deployment (main branch + stable release tags only) ---

    - name: Deploy documentation to cygwin.com
      env:
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      run: |
        # Determine deploy destination:
        #   main branch  → preview/
        #   cygwin-N.N.N → stable/  (development tags like cygwin-3.5.4.dev are excluded)
        case "${{ github.ref }}" in
          refs/heads/main)
            DEST='preview'
            ;;
          refs/tags/cygwin-[0-9.]*)
            DEST='stable'
            ;;
          *)
            echo "Not a deployable ref (${{ github.ref }}); skipping deploy."
            exit 0
            ;;
        esac

        # GitHub container actions override HOME in non-standard ways; unset it
        # so that ssh uses the real home directory.
        unset HOME

        # Trust the cygwin.com host key (ed25519, verified against DNSSEC)
        mkdir -p ~/.ssh/
        echo "cygwin.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKoejTnTCbXaIIMYfbX7t4tYUOQ2bTxZC3e/td3BageF" \
          >> ~/.ssh/known_hosts

        # Load the deploy key (restricted to scp on the remote end)
        ssh-agent -a $SSH_AUTH_SOCK > /dev/null
        ssh-add - <<< "${{ secrets.SSH_KEY }}"

        # Deploy docs. Note: 'make install' does not install the FAQ, so we
        # copy directly from the build directory instead.
        scp -pr build/*/winsup/doc/{cygwin-api,cygwin-ug-net,faq} \
          cygwin-admin@cygwin.com:/sourceware/www/sourceware/htdocs/cygwin/doc/${DEST}/

        echo "Documentation deployed to ${DEST}/"
      if: env.HAS_SSH_KEY == 'true'

  # ---------------------------------------------------------------------------

  windows-build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: x86_64-pc-cygwin
          pkgarch: x86_64
    name: Windows native ${{ matrix.pkgarch }}

    steps:
    # Prevent git from converting line endings to CRLF on checkout.
    # Must happen before actions/checkout because native git is used here.
    - run: git config --global core.autocrlf input
    - uses: actions/checkout@v4

    - name: Install Cygwin and build dependencies
      uses: cygwin/cygwin-install-action@v4
      with:
        platform: ${{ matrix.pkgarch }}
        packages: >-
          autoconf,
          automake,
          busybox,
          cocom,
          cygutils-extra,
          dblatex,
          dejagnu,
          docbook-xml45,
          docbook-xsl,
          docbook2X,
          gcc-g++,
          gettext-devel,
          libiconv,
          libiconv-devel,
          libzstd-devel,
          make,
          mingw64-${{ matrix.pkgarch }}-gcc-g++,
          mingw64-${{ matrix.pkgarch }}-zlib,
          patch,
          perl,
          python3-lxml,
          python3-ply,
          texlive-collection-fontsrecommended,
          texlive-collection-latexrecommended,
          texlive-collection-pictures,
          xmlto,
          zlib-devel

    - name: Build Cygwin
      run: >-
        export PATH=/usr/bin:$(cygpath ${SYSTEMROOT})/system32 &&
        mkdir build install &&
        (cd winsup; ./autogen.sh) &&
        cd build &&
        ../configure --prefix=$(realpath $(pwd)/../install) -v &&
        export MAKEFLAGS=-j$(nproc) &&
        make &&
        make install &&
        (cd */newlib; make info man) &&
        (cd */newlib; make install-info install-man)
      shell: C:\cygwin\bin\bash.exe --noprofile --norc -eo pipefail '{0}'

    - name: Run Cygwin test suite
      run: >-
        export PATH=/usr/bin:$(cygpath ${SYSTEMROOT})/system32 &&
        export MAKEFLAGS=-j$(nproc) &&
        cd build &&
        (export PATH=${{ matrix.target }}/winsup/testsuite/testinst/bin:${PATH} &&
          cmd /c $(cygpath -wa ${{ matrix.target }}/winsup/cygserver/cygserver) &) &&
        (cd ${{ matrix.target }}/winsup; make check AM_COLOR_TESTS=always)
      shell: C:\cygwin\bin\bash.exe --noprofile --norc -eo pipefail '{0}'

    - name: Upload test logs
      uses: actions/upload-artifact@v4
      with:
        name: testlogs-${{ matrix.pkgarch }}
        # Collect both DejaGnu .log and .trs (test result summary) files
        path: |
          build/${{ matrix.target }}/winsup/testsuite/**/*.log
          build/${{ matrix.target }}/winsup/testsuite/**/*.trs
        # Keep logs for 30 days for post-mortem analysis
        retention-days: 30
      if: ${{ !cancelled() }}

    # Workaround: actions/checkout's post-run cleanup step calls 'git', which
    # resolves to the Cygwin git installed above rather than the Windows-native
    # git the step expects. Remove the Cygwin git so the cleanup finds the right one.
    - name: Remove Cygwin git to avoid post-run cleanup conflict
      run: bash -c 'rm /usr/bin/git.exe'
